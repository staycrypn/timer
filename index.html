<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Acaanist">
    <title>Acaanist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-section">
        <div id="timer-display">00:00,00</div>
        <div class="controls-row">
            <button class="btn" id="lap-btn">Giro</button>
            <div class="page-indicator">
                <div class="dot active"></div>
                <div class="dot inactive"></div>
            </div>
            <button class="btn" id="start-btn">Avvia</button>
        </div>
    </div>

    <div class="separator"></div>

    <div class="bottom-section">
        <div id="footer-zone" onclick="togglePanel()">
            <span class="sys-text" id="live-pos-code">v. 2.0.--</span>
        </div>

        <div class="tab-bar-container">
            <div class="tab-item">
                <div class="tab-icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.1.8-1.2-4.5-2.7V7z"/></svg>
                </div>
                <span>Ore locali</span>
            </div>
            <div class="tab-item" id="voice-trigger">
                <div class="tab-icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 24 24"><path d="M21.2 5.3l-1.3-1.5-4.6 3.9 1.3 1.5 4.6-3.9zM8.7 7.7L4.1 3.8l-1.3 1.5 4.6 3.9 1.3-1.5zM12 5c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8zm0 14c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm1-10h-2v5h5v-2h-3V9z"/></svg>
                </div>
                <span>Sveglia</span>
            </div>
            <div class="tab-item active">
                <div class="tab-icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8-6.6l1.4-1.4c-.4-.5-.9-1-1.4-1.4L17.6 6c-1.5-1.2-3.5-2-5.6-2-5 0-9 4-9 9s4 9 9 9 9-4 9-9c0-2.1-.8-4.1-2-5.6zM12 20c-3.9 0-7-3.1-7-7s3.1-7 7-7 7 3.1 7 7-3.1 7-7 7z"/></svg>
                </div>
                <span>Cronometro</span>
            </div>
            <div class="tab-item">
                <div class="tab-icon-wrapper">
                    <svg class="tab-svg" viewBox="0 0 24 24"><path d="M6 2h12v6l-4 4 4 4v6H6v-6l4-4-4-4V2zm10 14.5l-4-4-4 4V20h8v-3.5zm-4-5l4-4V4H8v3.5l4 4z"/></svg>
                </div>
                <span>Timer</span>
            </div>
        </div>
    </div>

    <div id="secret-panel">
        <div class="grid-title">PENSATA (VOCALE ATTIVA)</div>
        <div id="target-ranks" class="grid"></div>
        <div id="target-suits" class="suits"></div>
        <hr style="border:0; border-top:1px solid #1a1a1a; margin: 20px 30px;">
        <div class="grid-title">FONDO</div>
        <div id="bottom-ranks" class="grid"></div>
        <div id="bottom-suits" class="suits"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
